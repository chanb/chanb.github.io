<body>
  <!-- Dynamic generation -->
  <script src="https://unpkg.com/mustache@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
  <script type="text/javascript" src="/scripts/js-yaml.min.js"></script>
  <script type="text/javascript">
  function renderHello() {
    var template = document.getElementById('template').innerHTML;
    $.get("./blogs.yaml").done(function(data) {
      try {
      papers = jsyaml.load(data)
      var rendered = Handlebars.compile(template)(papers);
      document.getElementById('mustache_target').innerHTML = rendered;
      }
      catch(err) {
        console.log(err);
      }
    });
  }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

  <!-- Dark mode -->
  <script src="https://cdn.jsdelivr.net/npm/darkmode-js@1.5.5/lib/darkmode-js.min.js"></script>
  <script>
  var options = {
    autoMatchOsTheme: false // default: true
  }

  const darkmode = new Darkmode(options);
  darkmode.showWidget();
  </script>

  <!-- body -->
  <div style="max-width:900; width:100%; margin:0 auto">

    <div style="width:100%; text-align=left;margin-top:20; ">
      <heading><a href="/">Home</a>/<a href="/blogs">Blogs</a>/test</heading>
    </div>


    <script type="text/javascript">
    renderHello()
    </script>

    <hr>
    <div style="margin:auto">
      <center>
      Template from <a href="https://colinqiyangli.github.io/">this</strong></a>
      </center>
    </div>
  </div>
</body>
</html>
